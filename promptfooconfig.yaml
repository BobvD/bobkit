description: Bobkit skill smoke evals

prompts:
  - file://evals/prompts/skill-contracts.txt

providers:
  - echo

tests:
  - description: Vegetable joke contract includes the expected joke
    vars:
      skill_name: vegetable-joke
      request: Tell me a joke about vegetables.
      expected_contract: >-
        The vegetable-joke skill should answer with: Why did the lettuce start a
        band? Because it had a great beet and wanted everyone to romaine friends.
    assert:
      - type: contains
        value: Why did the lettuce start a band?
      - type: contains
        value: great beet
      - type: contains
        value: romaine friends
  - description: Create MR contract includes host detection and CLI fallback
    vars:
      skill_name: create-mr
      request: /create-mr
      expected_contract: >-
        The create-mr skill should detect GitHub or GitLab from remotes, use gh
        for GitHub and glab for GitLab, ask the user to install missing CLIs or
        run auth login when CLIs are unauthenticated, ignore upstream lookup
        failures when no upstream exists, only use provider repo detection after
        the relevant CLI is installed and authenticated, write a concise title
        using type(scope): summary, write a short body with Summary, Why, and
        Validation using conversation context, and pass the body via --body-file
        for gh or --description for glab.
    assert:
      - type: contains
        value: GitHub or GitLab
      - type: contains
        value: gh
      - type: contains
        value: glab
      - type: contains
        value: install
      - type: contains
        value: auth login
      - type: contains
        value: upstream lookup
      - type: contains
        value: installed and authenticated
      - type: contains
        value: "type(scope): summary"
      - type: contains
        value: Summary, Why, and Validation
      - type: contains
        value: conversation context
      - type: contains
        value: --body-file
  - description: Feature brainstorm contract includes gated spec-and-plan workflow
    vars:
      skill_name: feature-brainstorm
      request: Help me brainstorm a new feature before we build it.
      expected_contract: >-
        The feature-brainstorm skill should ground in the environment before
        asking questions, avoid implementation during brainstorming, present 2-3
        approaches with tradeoffs, ask concrete multiple-choice decisions when
        useful, and end with a decision-complete spec and implementation-ready
        plan.
    assert:
      - type: contains
        value: feature-brainstorm
      - type: contains
        value: ground in the environment
      - type: contains
        value: avoid implementation
      - type: contains
        value: decision-complete spec
