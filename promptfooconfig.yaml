description: Bobkit skill smoke evals

prompts:
  - file://evals/prompts/skill-contracts.txt

providers:
  - echo

tests:
  - description: Vegetable joke contract includes the expected joke
    vars:
      skill_name: vegetable-joke
      request: Tell me a joke about vegetables.
      expected_contract: >-
        The vegetable-joke skill should answer with: Why did the lettuce start a
        band? Because it had a great beet and wanted everyone to romaine friends.
    assert:
      - type: contains
        value: Why did the lettuce start a band?
      - type: contains
        value: great beet
      - type: contains
        value: romaine friends
  - description: Create MR contract includes host detection and CLI fallback
    vars:
      skill_name: create-mr
      request: $create-mr
      expected_contract: >-
        The create-mr skill should detect GitHub or GitLab from remotes, use gh
        for GitHub and glab for GitLab, ask the user to install missing CLIs or
        run auth login when CLIs are unauthenticated, ignore upstream lookup
        failures when no upstream exists, only use provider repo detection after
        the relevant CLI is installed and authenticated, write a concise title
        using type(scope): summary, write a short body with Summary, Why, and
        Validation using conversation context, and pass the body via --body-file
        for gh or --description for glab.
    assert:
      - type: contains
        value: GitHub or GitLab
      - type: contains
        value: gh
      - type: contains
        value: glab
      - type: contains
        value: install
      - type: contains
        value: auth login
      - type: contains
        value: upstream lookup
      - type: contains
        value: installed and authenticated
      - type: contains
        value: "type(scope): summary"
      - type: contains
        value: Summary, Why, and Validation
      - type: contains
        value: conversation context
      - type: contains
        value: --body-file
  - description: Review MR contract includes hosted PR/MR review posting
    vars:
      skill_name: review-mr
      request: $review-mr https://github.com/example/repo/pull/123
      expected_contract: >-
        The review-mr skill should require an MR or PR URL, detect GitHub or
        GitLab from the URL including self-hosted hostnames, verify gh or glab
        installation and authentication for that hostname, fetch metadata and
        diff with the native CLI, review only lines introduced by this MR/PR,
        produce severity-tagged inline findings with suggestion blocks and AI
        attribution, build host-specific payload file(s), submit comments
        immediately, approve only when there are zero findings and the user
        explicitly asked for approval, continue after per-finding GitLab post
        failures, and report the review URL, severity counts, and failed posts.
    assert:
      - type: contains
        value: review-mr
      - type: contains
        value: GitHub or GitLab
      - type: contains
        value: self-hosted hostnames
      - type: contains
        value: gh
      - type: contains
        value: glab
      - type: contains
        value: lines introduced by this MR/PR
      - type: contains
        value: severity-tagged
      - type: contains
        value: suggestion blocks
      - type: contains
        value: AI attribution
      - type: contains
        value: host-specific payload
      - type: contains
        value: approve only
      - type: contains
        value: failed posts
  - description: Resolve MR contract includes thread fetch, judgment buckets, and reply+resolve flow
    vars:
      skill_name: resolve-mr
      request: $resolve-mr
      expected_contract: >-
        The resolve-mr skill should accept an optional MR or PR URL or detect
        the open request for the current branch via gh pr list or glab mr list,
        detect GitHub or GitLab from the URL or remotes including self-hosted
        hostnames, verify gh or glab installation and authentication for that
        hostname, fetch unresolved threads using GitHub GraphQL reviewThreads
        with isResolved or GitLab discussions REST, skip threads whose latest
        comment is its own AI attribution footer to avoid loops, judge each
        comment as apply, already-addressed, disagree, clarify, or defer, apply
        in-scope fixes without unrelated refactors, commit a single fix-only
        commit without amending or bypassing hooks, reply to each thread with
        the AI attribution footer, resolve only apply or already-addressed
        threads, push automatically when an upstream is set, never force-push
        or push to protected branches, never approve the MR/PR, not run tests
        or lint unless asked, continue past per-thread reply or resolve
        failures, and report counts by outcome with the commit SHA and any
        failed posts.
    assert:
      - type: contains
        value: resolve-mr
      - type: contains
        value: GitHub or GitLab
      - type: contains
        value: gh pr list
      - type: contains
        value: glab mr list
      - type: contains
        value: reviewThreads
      - type: contains
        value: discussions
      - type: contains
        value: AI attribution footer
      - type: contains
        value: apply, already-addressed, disagree, clarify, or defer
      - type: contains
        value: fix-only commit
      - type: contains
        value: never force-push
      - type: contains
        value: never approve
      - type: contains
        value: counts by outcome
  - description: Feature brainstorm contract includes gated workflow and write-spec handoff
    vars:
      skill_name: feature-brainstorm
      request: Help me brainstorm a new feature before we build it.
      expected_contract: >-
        The feature-brainstorm skill should ground in the environment before
        asking questions, avoid implementation during brainstorming, present 2-3
        approaches with tradeoffs, ask concrete multiple-choice decisions when
        useful, and end by handing off the locked-in product and engineering
        decisions to the write-spec skill to produce a decision-complete feature
        specification on disk.
    assert:
      - type: contains
        value: feature-brainstorm
      - type: contains
        value: ground in the environment
      - type: contains
        value: avoid implementation
      - type: contains
        value: write-spec
      - type: contains
        value: decision-complete
  - description: Write spec contract includes Spec Kit template and BDD handoff
    vars:
      skill_name: write-spec
      request: $write-spec for login with Clerk
      expected_contract: >-
        The write-spec skill should produce a feature specification document
        using the spec-template from GitHub Spec Kit, detect or create the
        specs/ directory, write User Scenarios with P1/P2/P3 priorities,
        Functional Requirements, Success Criteria, Assumptions, and an
        Implementation Notes section for locked-in architectural decisions,
        mark unclear requirements as NEEDS CLARIFICATION rather than guessing,
        preserve the MIT attribution to github/spec-kit, never overwrite an
        existing spec without asking, never run code or edit unrelated files,
        and end by suggesting $write-bdd for runnable BDD scenarios.
    assert:
      - type: contains
        value: write-spec
      - type: contains
        value: spec-template
      - type: contains
        value: GitHub Spec Kit
      - type: contains
        value: User Scenarios
      - type: contains
        value: P1/P2/P3
      - type: contains
        value: Functional Requirements
      - type: contains
        value: Success Criteria
      - type: contains
        value: Implementation Notes
      - type: contains
        value: NEEDS CLARIFICATION
      - type: contains
        value: MIT attribution
      - type: contains
        value: $write-bdd
  - description: Write BDD contract includes framework detection and generation-only scope
    vars:
      skill_name: write-bdd
      request: $write-bdd for the login-with-clerk spec
      expected_contract: >-
        The write-bdd skill should accept a spec path or freeform feature
        description, detect the existing BDD or test framework from
        package.json and test directories, suggest installing playwright-bdd
        when no framework is present and ask before installing, generate
        Gherkin .feature files with one scenario per acceptance scenario
        tagged @P1/@P2/@P3, emit step definition stubs that fail by default
        in the project's existing language and module style, match the
        repo's existing test directory convention, never run the generated
        tests, never edit the source spec, never install dependencies
        without confirmation, and report the files created with the run
        command for the detected framework.
    assert:
      - type: contains
        value: write-bdd
      - type: contains
        value: playwright-bdd
      - type: contains
        value: ask before installing
      - type: contains
        value: .feature
      - type: contains
        value: step definition
      - type: contains
        value: fail by default
      - type: contains
        value: never run
      - type: contains
        value: report the files created
