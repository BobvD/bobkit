description: Bobkit skill smoke evals

prompts:
  - file://evals/prompts/skill-contracts.txt

providers:
  - echo

tests:
  - description: Vegetable joke contract includes the expected joke
    vars:
      request: Tell me a joke about vegetables.
    assert:
      - type: contains
        value: Why did the lettuce start a band?
      - type: contains
        value: great beet
      - type: contains
        value: romaine friends
  - description: Create MR contract includes host detection and CLI fallback
    vars:
      request: /create-mr
    assert:
      - type: contains
        value: GitHub or GitLab
      - type: contains
        value: gh
      - type: contains
        value: glab
      - type: contains
        value: install
      - type: contains
        value: auth login
      - type: contains
        value: Ignore the upstream lookup failure
      - type: contains
        value: after the relevant CLI is installed and authenticated
      - type: contains
        value: "type(scope): summary"
      - type: contains
        value: Summary, Why, and Validation
      - type: contains
        value: conversation context
      - type: contains
        value: --body-file
