description: Bobkit Claude behavior evals

prompts:
  - file://evals/prompts/skill-behavior.cjs

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      apiKeyRequired: false
      temperature: 0
      max_tokens: 4000

tests:
  - description: Vegetable joke returns the exact skill response
    vars:
      skill_name: vegetable-joke
      request: Tell me a joke about vegetables.
      scenario: |-
        Normal chat request. No repository or command context is needed.
    assert:
      - type: javascript
        value: file://evals/assertions/skill-behavior.cjs:vegetableJoke

  - description: Feature brainstorm stays in planning mode, uses repo context, and asks a decision
    vars:
      skill_name: feature-brainstorm
      request: I want to set up Claude evals for Bobkit skills. Help me figure it out before we build it.
      scenario: |-
        Repository context already inspected:
        - Bobkit has five source skills under .rulesync/skills.
        - promptfooconfig.yaml currently runs free Promptfoo smoke evals with the echo provider.
        - evals/prompts/skill-contracts.txt currently includes expected_contract text, so it is not suitable for a real model behavior eval.
        - package.json has npm run eval for smoke evals and npm run ci uses build:claude plus eval.
        - CONTRIBUTING.md documents contributor commands and validation.
    assert:
      - type: javascript
        value: file://evals/assertions/skill-behavior.cjs:featureBrainstorm

  - description: Create MR stops outside a git repository
    vars:
      skill_name: create-mr
      request: $create-mr
      scenario: |-
        Simulated command result:
        - git rev-parse --show-toplevel exits 128 with "fatal: not a git repository".
        No other commands have been run.
    assert:
      - type: javascript
        value: file://evals/assertions/skill-behavior.cjs:createMrNonGit

  - description: Review MR requires an explicit PR or MR URL
    vars:
      skill_name: review-mr
      request: $review-mr
      scenario: |-
        The user did not provide a pull request or merge request URL.
        No current branch or remote should be guessed for this skill.
    assert:
      - type: javascript
        value: file://evals/assertions/skill-behavior.cjs:reviewMrMissingUrl

  - description: Resolve MR stops on the default branch
    vars:
      skill_name: resolve-mr
      request: $resolve-mr
      scenario: |-
        Simulated command results:
        - git rev-parse --show-toplevel prints "/tmp/bobkit".
        - git remote -v shows origin git@github.com:BobvD/bobkit.git.
        - git rev-parse --abbrev-ref --symbolic-full-name @{u} prints origin/main.
        - git branch --show-current prints main.
        The repository default branch is main.
        No PR lookup has been run.
    assert:
      - type: javascript
        value: file://evals/assertions/skill-behavior.cjs:resolveMrDefaultBranch

  - description: Write spec produces Spec Kit sections and suggests write-bdd
    vars:
      skill_name: write-spec
      request: $write-spec for adding email/password login with Clerk to the Next.js app
      scenario: |-
        Repository context already inspected:
        - Next.js App Router project with TypeScript.
        - No specs/ directory exists yet.
        - No auth currently wired up.
        - Locked-in decisions from prior brainstorm: use @clerk/nextjs v5, Clerk's
          pre-built <SignIn /> and <SignUp /> widgets, clerkMiddleware() for route
          protection, email/password + Google OAuth only, no MFA, no org/teams.
    assert:
      - type: javascript
        value: file://evals/assertions/skill-behavior.cjs:writeSpec

  - description: Write Constitution proposes indie defaults and writes to .bobkit
    vars:
      skill_name: write-constitution
      request: $write-constitution for this project
      scenario: |-
        Repository context already inspected:
        - Solo indie project, TypeScript Next.js app.
        - No .bobkit/ directory or constitution.md exists.
        - package.json name is "myapp".
        - Today's date is 2026-05-14.
    assert:
      - type: javascript
        value: file://evals/assertions/skill-behavior.cjs:writeConstitutionNew

  - description: Write Spec nudges to create a constitution when none exists
    vars:
      skill_name: write-spec
      request: $write-spec for adding a CSV export to the dashboard
      scenario: |-
        Repository context already inspected:
        - Next.js TypeScript app.
        - No .bobkit/ directory, no constitution.md.
        - specs/ directory does not exist yet.
        - Today's date is 2026-05-14.
    assert:
      - type: javascript
        value: file://evals/assertions/skill-behavior.cjs:writeSpecConstitutionMissing

  - description: Write Spec silently skips constitution prompt when declined stub is fresh
    vars:
      skill_name: write-spec
      request: $write-spec for adding a CSV export to the dashboard
      scenario: |-
        Repository context already inspected:
        - Next.js TypeScript app.
        - .bobkit/constitution.md exists with the following content (no Core Principles, declined stub):

          # Constitution

          _None set. Run `$write-constitution` to add project principles._

          <!-- declined: 2026-04-01 -->

        - specs/ directory does not exist yet.
        - Today's date is 2026-05-14 (44 days after the declined date — within the 90-day window).
    assert:
      - type: javascript
        value: file://evals/assertions/skill-behavior.cjs:writeSpecConstitutionStubFresh

  - description: Write BDD asks before installing playwright-bdd when no framework exists
    vars:
      skill_name: write-bdd
      request: $write-bdd for the login-with-clerk spec at specs/login-with-clerk/spec.md
      scenario: |-
        Repository context already inspected:
        - package.json devDependencies contain no BDD or test framework (no
          playwright-bdd, @cucumber/cucumber, @playwright/test, cypress).
        - No tests/, e2e/, features/, or cypress/ directories exist.
        - The spec file at specs/login-with-clerk/spec.md exists with three User
          Stories tagged P1, P2, P3 and acceptance scenarios in Given/When/Then form.
    assert:
      - type: javascript
        value: file://evals/assertions/skill-behavior.cjs:writeBddNoFramework
